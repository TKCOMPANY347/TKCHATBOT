<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com Status Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        .auth-container { background-color: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .chat-container { display: none; width: 100%; height: 100%; background-color: #fff; flex-direction: column; overflow: hidden; }
        .chat-header { background-color: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background-color: #efeae2; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; }
        .sent { background-color: #d9fdd3; align-self: flex-end; }
        .received { background-color: #fff; align-self: flex-start; }
        .chat-input-area { display: flex; padding: 15px; background-color: #f0f0f0; gap: 10px; border-top: 1px solid #e0e0e0; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background-color: #00a884; color: white; border: none; padding: 0 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .logout-btn { background-color: #e53935; padding: 5px 10px; border-radius: 5px; cursor: pointer; color: white; border: none; }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <h2>Acesso ao Chat</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span id="statusHeader">Chat (0 online)</span>
            <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Mensagem...">
            <button id="sendButton">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.firebasestorage.app",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Lógica de Login e Status
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                
                // Registar Online
                await setDoc(doc(db, "status", user.uid), { email: user.email, state: "online" });

                // Ouvir mensagens
                onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
                    const div = document.getElementById('chatMessages');
                    div.innerHTML = '';
                    snap.forEach(d => {
                        const data = d.data();
                        div.innerHTML += `<div class="message ${data.senderId === user.uid ? 'sent' : 'received'}">${data.text}</div>`;
                    });
                    div.scrollTop = div.scrollHeight;
                });
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        // Contador de Online
        onSnapshot(collection(db, "status"), (snap) => {
            document.getElementById('statusHeader').innerText = `Chat (${snap.size} online)`;
        });

        // Enviar
        document.getElementById('sendButton').onclick = async () => {
            const input = document.getElementById('messageInput');
            if (input.value) {
                await addDoc(collection(db, "messages"), { text: input.value, senderId: auth.currentUser.uid, timestamp: serverTimestamp() });
                input.value = '';
            }
        };

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        document.getElementById('logoutBtn').onclick = async () => {
            await deleteDoc(doc(db, "status", auth.currentUser.uid));
            signOut(auth);
        };
    </script>
</body>
</html>
