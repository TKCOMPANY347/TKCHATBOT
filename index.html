<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Company - Atendimento</title>
    <style>
        /* CSS Profissional e Responsivo */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .main-box { width: 100%; max-width: 450px; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Telas */
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; justify-content: center; }
        .screen.active { display: flex; }
        
        /* Inputs e Botões Profissionais */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Área de Chat */
        #chatScreen { padding: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #efeae2; display: flex; flex-direction: column; gap: 10px; }
        .chat-input { padding: 10px; background: #f0f0f0; display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="main-box">
    <div id="loginScreen" class="screen active">
        <h2>Login TK Company</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button id="btnLogin">Entrar</button>
        <p style="text-align:center; margin-top:10px;">Não tem conta? <a href="#" id="goRegister">Cadastre-se</a></p>
    </div>

    <div id="registerScreen" class="screen">
        <h2>Cadastro</h2>
        <input type="text" id="regName" placeholder="Seu Nome">
        <input type="email" id="regEmail" placeholder="E-mail">
        <input type="password" id="regPass" placeholder="Senha">
        <button id="btnRegister">Criar Conta</button>
    </div>

    <div id="chatScreen" class="screen">
        <div style="background:#075e54; color:white; padding:15px;">Atendimento TK</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="btnSend">Enviar</button>
        </div>
    </div>
</div>

<script type="module">
    // IMPORTES E CONFIGURAÇÕES AQUI (mantenha os mesmos que você já tem)
    
    // Função para trocar de tela
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // LÓGICA DE NAVEGAÇÃO
    document.getElementById('goRegister').onclick = () => showScreen('registerScreen');
    
    // O RESTANTE DA LÓGICA (Login, Cadastro e Chat) segue o padrão que testamos
</script>
</body>
</html>
