<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Seguro - TK Company</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "06967f51-b093-4a60-a8b6-e963731e24a2" });
      });
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chatContainer { width: 100%; max-width: 400px; background: white; border-radius: 10px; display: none; flex-direction: column; height: 90vh; }
        #chatHeader { padding: 15px; background: #075e54; color: white; border-radius: 10px 10px 0 0; font-weight: bold; }
        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="authContainer">
        <h2>Bem-vindo</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
    </div>

    <div id="chatContainer">
        <div id="chatHeader">
            <span id="userDisplay">Carregando...</span>
        </div>
        <div id="chatMessages"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Ao logar, define status online no Realtime Database
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('userDisplay').innerText = user.email + " (Online)";

                const statusRef = ref(db, 'status/' + user.uid);
                set(statusRef, { state: 'online', last_changed: serverTimestamp() });
                onDisconnect(statusRef).set({ state: 'offline', last_changed: serverTimestamp() });
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao entrar"));
        });
    </script>
</body>
</html>
