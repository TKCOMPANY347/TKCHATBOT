<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Chat - Versão Estável</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; }
        #authContainer { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f0f2f5; padding: 20px; }
        #authContainer input { width: 100%; max-width: 300px; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        #authContainer button { width: 100%; max-width: 300px; padding: 12px; margin-bottom: 5px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        #chatContainer { height: 100%; display: flex; flex-direction: column; }
        #chatHeader { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; }
        #chatMessages { flex: 1; padding: 20px; overflow-y: auto; background: #efeae2; }
        .input-area { padding: 15px; display: flex; background: white; border-top: 1px solid #ccc; }
        input#msgInput { flex: 1; padding: 10px; margin-right: 10px; border: 1px solid #ccc; }
        button#sendBtn { padding: 10px 20px; background: #075e54; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authContainer">
        <h2>TK Chat</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn" style="background:#075e54;">Entrar</button>
        <button id="registerBtn" style="background:#27ae60;">Criar Conta</button>
    </div>

    <div id="chatContainer" style="display:none;">
        <div id="chatHeader">
            <span id="userDisplay"></span>
            <button id="logoutBtn" style="background:#c0392b; border:none; color:white; padding:5px;">Sair</button>
        </div>
        <div id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('userDisplay').innerText = user.email;

                onValue(ref(db, 'messages'), (snap) => {
                    const div = document.getElementById('chatMessages');
                    div.innerHTML = '';
                    snap.forEach(s => {
                        const data = s.val();
                        div.innerHTML += `<div><b>${data.sender}:</b> ${data.text}</div>`;
                    });
                    div.scrollTop = div.scrollHeight;
                });
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        document.getElementById('registerBtn').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            if(input.value) {
                push(ref(db, 'messages'), { text: input.value, sender: auth.currentUser.email });
                input.value = '';
            }
        };
    </script>
</body>
</html>
