<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Seguro com IA Gemini - TK Company</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
        }

        /* CONTEINER DE AUTENTICAÇÃO */
        .auth-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .auth-tabs {
            display: flex;
            background-color: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            background-color: #fff;
            color: #075e54;
            border-bottom: 3px solid #00a884;
        }

        .auth-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-content h2 {
            color: #075e54;
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .auth-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 1rem;
        }

        .auth-content button {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        /* TELA DO CHAT */
        .chat-container {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #fff;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #075e54;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        #userDisplay {
            font-size: 0.95rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
            flex: 1;
        }

        .logout-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #efeae2;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message {
            max-width: 75%;
            padding: 6px 12px 6px 10px;
            font-size: 0.95rem;
            word-wrap: break-word;
            position: relative;
            display: flex;
            flex-direction: column;
            margin-bottom: 2px;
        }

        .message.sent {
            background-color: #d9fdd3;
            align-self: flex-end;
            border-radius: 8px 0px 8px 8px;
        }

        .message.received {
            background-color: #fff;
            align-self: flex-start;
            border-radius: 0px 8px 8px 8px;
        }

        /* Estilo visual destacado para a Inteligência Artificial */
        .message.bot-msg {
            background-color: #ffffff;
            border-left: 4px solid #005fcc;
        }

        .message.new-group {
            margin-top: 8px;
        }

        .message.sent.new-group::before {
            content: "";
            position: absolute;
            top: 0;
            right: -8px;
            width: 8px;
            height: 10px;
            background: linear-gradient(135deg, #d9fdd3 50%, transparent 50%);
        }

        .message.received.new-group::before {
            content: "";
            position: absolute;
            top: 0;
            left: -8px;
            width: 8px;
            height: 10px;
            background: linear-gradient(45deg, transparent 50%, #fff 50%);
        }

        .message .sender-email {
            font-size: 0.75rem;
            color: #00a884;
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .message .sender-email.bot-name {
            color: #005fcc;
        }

        .message-content-wrapper {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-end;
            gap: 15px;
        }

        .message-text {
            flex: 1;
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 0.68rem;
            color: #667781;
            white-space: nowrap;
            margin-bottom: -2px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px 15px;
            background-color: #f0f0f0;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 11px 15px;
            border: 1px solid #fff;
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            background-color: #fff;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .chat-input-area button {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLoginBtn">Entrar</button>
            <button class="tab-btn" id="tabRegisterBtn">Cadastrar</button>
        </div>

        <div class="auth-content">
            <div class="auth-form active" id="loginForm">
                <h2>Acessar o Chat</h2>
                <input type="email" id="loginEmail" placeholder="E-mail cadastrado" required>
                <input type="password" id="loginPassword" placeholder="Sua senha" required>
                <button id="submitLoginBtn">Fazer Login</button>
            </div>

            <div class="auth-form" id="registerForm">
                <h2>Criar Nova Conta</h2>
                <input type="email" id="registerEmail" placeholder="Escolha um e-mail válido" required>
                <input type="password" id="registerPassword" placeholder="Defina uma senha (mín. 6 caracteres)" required>
                <button id="submitRegisterBtn">Concluir Cadastro</button>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span id="userDisplay">Carregando usuário...</span>
            <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Pergunte qualquer coisa para a IA da TK..." autocomplete="off">
            <button id="sendButton">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // SUA CHAVE CONFIGURADA E PRONTA AQUI:
        const GEMINI_API_KEY = "AIzaSyD-zvmEOkhv1FLgf5t1w7Kt3ld7iQ_L0Xg";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        // Inicializações
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Elementos HTML
        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabRegisterBtn = document.getElementById('tabRegisterBtn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const submitLoginBtn = document.getElementById('submitLoginBtn');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const submitRegisterBtn = document.getElementById('submitRegisterBtn');
        const userDisplay = document.getElementById('userDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        let currentUser = null;
        let unsubscribeSnapshot = null;

        // --- CONTROLE DE ABAS ---
        tabLoginBtn.addEventListener('click', () => {
            tabLoginBtn.classList.add('active'); tabRegisterBtn.classList.remove('active');
            loginForm.classList.add('active'); registerForm.classList.remove('active');
        });
        tabRegisterBtn.addEventListener('click', () => {
            tabRegisterBtn.classList.add('active'); tabLoginBtn.classList.remove('active');
            registerForm.classList.add('active'); loginForm.classList.remove('active');
        });

        // --- AUTENTICAÇÃO ---
        submitLoginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim(); const password = loginPassword.value;
            if (!email || !password) return alert("Preencha todos os campos.");
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { alert("E-mail ou senha incorretos."); }
        });

        submitRegisterBtn.addEventListener('click', async () => {
            const email = registerEmail.value.trim(); const password = registerPassword.value;
            if (!email || !password) return alert("Preencha todos os campos.");
            if (password.length < 6) return alert("Mínimo 6 caracteres.");
            try { await createUserWithEmailAndPassword(auth, email, password); alert("Cadastrado com sucesso!"); } catch (e) { alert("Erro no cadastro."); }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userDisplay.innerText = `Logado como: ${user.email}`;
                authContainer.style.display = "none";
                chatContainer.style.display = "flex";
                startChatListener();
            } else {
                currentUser = null;
                authContainer.style.display = "flex";
                chatContainer.style.display = "none";
                chatMessages.innerHTML = "";
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        // --- FUNÇÃO PARA CONVERSAR COM O GEMINI ---
        async function chamarInteligenciaGemini(mensagemUsuario) {
            const hora = new Date().getHours();
            let saudacao = "Boa noite";
            if (hora >= 5 && hora < 12) saudacao = "Bom dia";
            else if (hora >= 12 && hora < 18) saudacao = "Boa tarde";

            const instrucaoEmpresa = `Instrução: Você é a Inteligência Virtual oficial e o Atendente inteligente da TK Company. Sempre inicie com '${saudacao}!'. Seja prestativo, empático e responda de forma muito inteligente e fluida. Caso o usuário queira informações sobre a nossa empresa, aborde os nossos tópicos: Internet ilimitada, aplicativo de streamer, programa de indicação de amigos e suporte técnico. Para quaisquer outras perguntas cotidianas, responda com sua inteligência natural normalmente de forma incrível.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${instrucaoEmpresa}\n\nCliente perguntou: ${mensagemUsuario}` }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                }
                return "Deu um pequeno erro na resposta, pode tentar digitar novamente?";
            } catch (error) {
                console.error("Erro na chamada do Gemini:", error);
                return "Erro de conexão com a inteligência artificial.";
            }
        }

        // --- ENVIAR MENSAGENS NO CHAT ---
        async function sendMessage() {
            const messageText = messageInput.value.trim();
            if (messageText === '' || !currentUser) return;

            messageInput.value = '';

            try {
                await addDoc(collection(db, "messages"), {
                    text: messageText,
                    senderId: currentUser.uid,
                    senderEmail: currentUser.email,
                    timestamp: serverTimestamp()
                });

                const respostaDaIA = await chamarInteligenciaGemini(messageText);
                
                await addDoc(collection(db, "messages"), {
                    text: respostaDaIA,
                    senderId: "TK_GEMINI_AI", 
                    senderEmail: "Inteligência Virtual (TK Company)",
                    timestamp: serverTimestamp()
                });

            } catch (error) {
                console.error("Erro ao salvar mensagem no fluxo:", error);
            }
        }

        // --- ESCUTAR CHAT EM TEMPO REAL ---
        function startChatListener() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = '';
                let lastSenderId = null;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (!data.timestamp) return;

                    let messageType = 'received';
                    if (data.senderId === currentUser.uid) {
                        messageType = 'sent';
                    } else if (data.senderId === 'TK_GEMINI_AI') {
                        messageType = 'received bot-msg'; 
                    }
                    
                    const isNewGroup = data.senderId !== lastSenderId;
                    lastSenderId = data.senderId;

                    const firebaseDate = data.timestamp.toDate();
                    const hours = String(firebaseDate.getHours()).padStart(2, '0');
                    const minutes = String(firebaseDate.getMinutes()).padStart(2, '0');
                    const timeString = `${hours}:${minutes}`;

                    const messageDiv = document.createElement('div');
                    messageDiv.classList.add('message');
                    messageType.split(' ').forEach(cls => messageDiv.classList.add(cls));
                    
                    if (isNewGroup) messageDiv.classList.add('new-group');
                    
                    let emailClass = "sender-email";
                    if (data.senderId === 'TK_GEMINI_AI') emailClass += " bot-name";

                    const emailHeader = (isNewGroup) ? `<span class="${emailClass}">${data.senderEmail}</span>` : '';
                    
                    messageDiv.innerHTML = `
                        ${emailHeader}
                        <div class="message-content-wrapper">
                            <span class="message-text">${data.text}</span>
                            <span class="message-time">${timeString}</span>
                        </div>
                    `;
                    
                    chatMessages.appendChild(messageDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
