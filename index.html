<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Chat</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; }
        
        /* Ajuste da tela de Login */
        #authContainer { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background-color: #f0f2f5; }
        #authContainer h2 { color: #075e54; margin-bottom: 20px; }
        #authContainer input { width: 100%; max-width: 300px; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #authContainer button { width: 100%; max-width: 300px; padding: 12px; background: #075e54; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Estilização do Chat */
        #chatContainer { height: 100%; display: flex; flex-direction: column; }
        #chatHeader { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; }
        
        /* Painel de Presença */
        #presencePanel { padding: 8px; background: #e0e0e0; font-size: 12px; color: #333; text-align: center; border-bottom: 1px solid #ccc; }
        
        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; }
        .input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-right: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #075e54; color: white; border: none; border-radius: 4px; }
        #logoutBtn { background: #c0392b; font-size: 12px; }
        .msg { margin-bottom: 10px; padding: 10px; background: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="authContainer">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
    </div>

    <div id="chatContainer" style="display:none;">
        <div id="chatHeader">
            <span id="userDisplay"></span>
            <button id="logoutBtn">Sair</button>
        </div>
        <div id="presencePanel">Carregando...</div>
        <div id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('userDisplay').innerText = user.email;

                // Status Online
                const statusRef = ref(db, 'status/' + user.uid);
                set(statusRef, { state: 'online', email: user.email });
                onDisconnect(statusRef).set({ state: 'offline' });

                // Painel de Presença: Monitora todos os status
                onValue(ref(db, 'status'), (snapshot) => {
                    let onlineUsers = [];
                    snapshot.forEach((child) => {
                        if (child.val().state === 'online') {
                            onlineUsers.push(child.val().email);
                        }
                    });
                    document.getElementById('presencePanel').innerText = "Online: " + onlineUsers.join(', ');
                });

                // Carrega mensagens
                onValue(ref(db, 'messages'), (snapshot) => {
                    const msgDiv = document.getElementById('chatMessages');
                    msgDiv.innerHTML = '';
                    snapshot.forEach((child) => {
                        const data = child.val();
                        msgDiv.innerHTML += `<div class="msg"><b>${data.sender}:</b> ${data.text}</div>`;
                    });
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                });
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(auth.currentUser) set(ref(db, 'status/' + auth.currentUser.uid), { state: 'offline' });
            signOut(auth);
        });

        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('msgInput');
            if(input.value) {
                push(ref(db, 'messages'), { text: input.value, sender: auth.currentUser.email });
                input.value = '';
            }
        });
    </script>
</body>
</html>
