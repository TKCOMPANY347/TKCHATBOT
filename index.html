<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TK Chat</title>
    <style>
        body { font-family: sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        #authContainer { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #chatContainer { flex: 1; display: flex; flex-direction: column; }
        #chatMessages { flex: 1; overflow-y: auto; background: #efeae2; padding: 10px; }
        input { padding: 10px; margin: 5px; width: 250px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="authContainer">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
    </div>

    <div id="chatContainer" style="display:none;">
        <div id="presencePanel" style="background:#ddd; padding:5px;">Online: ...</div>
        <div id="chatMessages"></div>
        <div style="padding:10px;">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="sendBtn">Enviar</button>
            <button id="logoutBtn">Sair</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        });

        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                
                // Status Online
                const statusRef = ref(db, 'status/' + user.uid);
                set(statusRef, { state: 'online', email: user.email });
                onDisconnect(statusRef).set({ state: 'offline' });

                // Monitorar usuários
                onValue(ref(db, 'status'), (snap) => {
                    let online = [];
                    snap.forEach(s => { if(s.val().state === 'online') online.push(s.val().email); });
                    document.getElementById('presencePanel').innerText = "Online: " + online.join(', ');
                });

                // Mensagens
                onValue(ref(db, 'messages'), (snap) => {
                    const div = document.getElementById('chatMessages');
                    div.innerHTML = '';
                    snap.forEach(s => div.innerHTML += `<div><b>${s.val().sender}:</b> ${s.val().text}</div>`);
                });
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('sendBtn').onclick = () => {
            push(ref(db, 'messages'), { text: document.getElementById('msgInput').value, sender: auth.currentUser.email });
            document.getElementById('msgInput').value = '';
        };
    </script>
</body>
</html>
