<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body {
            /* Fundo configurado com a sua imagem */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('photo_2026-03-16_14-04-07.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .auth-container { background-color: #fff; border-radius: 10px; width: 100%; max-width: 400px; overflow: hidden; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: #075e54; border-bottom: 3px solid #075e54; }
        .auth-form { display: none; flex-direction: column; gap: 10px; }
        .auth-form.active { display: flex; }
        
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .chat-container { display: none; width: 100%; max-width: 450px; height: 90vh; background: #fff; flex-direction: column; border-radius: 10px; overflow: hidden; }
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; max-width: 75%; }
        .message.sent { background: #d9fdd3; align-self: flex-end; }
        .message.received { background: #fff; align-self: flex-start; }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLoginBtn">Entrar</button>
            <button class="tab-btn" id="tabRegisterBtn">Cadastrar</button>
        </div>
        <div class="auth-form active" id="loginForm">
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button id="submitLoginBtn">Entrar</button>
        </div>
        <div class="auth-form" id="registerForm">
            <input type="email" id="registerEmail" placeholder="E-mail">
            <input type="password" id="registerPassword" placeholder="Senha (mín. 6)">
            <button id="submitRegisterBtn">Cadastrar</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span id="userDisplay">Chat</span>
            <button class="logout-btn" onclick="location.reload()" style="background:#e53935; border:none; color:white; padding:5px 10px; cursor:pointer;">Sair</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Mensagem...">
            <button id="sendButton">Enviar</button>
        </div>
    </div>
