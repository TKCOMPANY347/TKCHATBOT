<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Company - Painel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('photo_2026-03-16_14-04-07.jpg');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; justify-content: center; align-items: center; 
        }
        .box { width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border: none; background: none; font-weight: bold; }
        .tab-btn.active { color: #075e54; border-bottom: 3px solid #075e54; }
        .form-area { display: none; }
        .form-area.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button.btn-main { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #painelStatus { display: none; }
        #adminControls { display: none; margin-top: 20px; border-top: 2px solid #075e54; padding-top: 20px; }
    </style>
</head>
<body>

<div class="box" id="authBox">
    <div class="tabs">
        <div class="tab-btn active" onclick="showForm('login')">Entrar</div>
        <div class="tab-btn" onclick="showForm('register')">Cadastrar</div>
    </div>
    <div id="loginForm" class="form-area active">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-main" id="btnLogin">Entrar</button>
    </div>
    <div id="registerForm" class="form-area">
        <input type="email" id="regEmail" placeholder="E-mail">
        <input type="password" id="regSenha" placeholder="Senha">
        <button class="btn-main" id="btnRegister">Cadastrar</button>
    </div>
</div>

<div class="box" id="painelStatus">
    <h2>Olá!</h2>
    <div style="margin: 20px 0;">
        <p>Seu Status Atual:</p>
        <h2 id="meuStatus" style="color:#075e54; margin:10px 0;">Carregando...</h2>
        <p id="minhaObs"></p>
    </div>

    <div id="adminControls">
        <h4 style="margin-bottom: 10px;">Painel Admin</h4>
        <input type="text" id="adminUID" placeholder="UID do Cliente">
        <input type="text" id="newStatus" placeholder="Novo Status">
        <input type="text" id="newObs" placeholder="Nova Observação">
        <button onclick="updatePedido()" style="background:#28a745; border:none; padding:10px; width:100%; color:white; cursor:pointer;">Atualizar Cliente</button>
    </div>

    <button onclick="location.reload()" style="margin-top:20px; background:#e53935; border:none; padding:10px; width:100%; color:white; cursor:pointer;">Sair</button>
</div>

<script>
    function showForm(type) {
        document.querySelectorAll('.form-area').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(type + 'Form').classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
        authDomain: "tkbot-d91db.firebaseapp.com",
        projectId: "tkbot-d91db",
        storageBucket: "tkbot-d91db.firebasestorage.app",
        messagingSenderId: "636885931448",
        appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.updatePedido = async () => {
        const uid = document.getElementById('adminUID').value;
        const status = document.getElementById('newStatus').value;
        const obs = document.getElementById('newObs').value;
        try {
            await setDoc(doc(db, "pedidos", uid), { status, obs });
            alert("Pedido atualizado com sucesso!");
        } catch (e) { alert("Erro ao atualizar!"); }
    };

    function entrarNoPainel(user) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('painelStatus').style.display = 'block';
        
        // Verifica se é o Admin
        if (user.email === "patrickrobert347@gmail.com") {
            document.getElementById('adminControls').style.display = 'block';
        }

        onSnapshot(doc(db, "pedidos", user.uid), (doc) => {
            if (doc.exists()) {
                document.getElementById('meuStatus').innerText = doc.data().status;
                document.getElementById('minhaObs').innerText = doc.data().obs;
            } else {
                document.getElementById('meuStatus').innerText = "Nenhum status encontrado.";
            }
        });
    }

    document.getElementById('btnLogin').onclick = async () => {
        try {
            const user = (await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)).user;
            entrarNoPainel(user);
        } catch (e) { alert("E-mail ou senha incorretos!"); }
    };

    document.getElementById('btnRegister').onclick = async () => {
        try {
            await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regSenha').value);
            alert("Cadastro realizado com sucesso!");
        } catch (e) { alert("Erro no cadastro!"); }
    };
</script>
</body>
</html>
