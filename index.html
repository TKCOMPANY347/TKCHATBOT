<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TK Company - Painel</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 95%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tabs-nav { display: flex; border-bottom: 1px solid #ccc; margin-bottom: 15px; }
        .tab-link { flex: 1; padding: 10px; cursor: pointer; text-align: center; }
        .tab-link.active { border-bottom: 2px solid #075e54; font-weight: bold; }
        
        /* Estilos do Chat */
        #chatBox { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; background: #f1f1f1; width: fit-content; max-width: 80%; }
        .msg.me { align-self: flex-end; background: #dcf8c6; margin-left: auto; }
    </style>
</head>
<body>

<div class="box" id="authBox">
    <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="password" id="senha" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:10px;">
    <button id="btnLogin" style="width:100%; padding:10px; background:#075e54; color:white; border:none;">Entrar</button>
</div>

<div class="box" id="painelBox" style="display:none;">
    <div class="tabs-nav">
        <div class="tab-link active" onclick="openTab('status')">Status</div>
        <div class="tab-link" onclick="openTab('chat')">Chat</div>
    </div>

    <div id="tabStatus" class="tab-content active">
        <div id="statusBadge" style="padding:15px; text-align:center; border-radius:10px; color:white;">Carregando...</div>
    </div>

    <div id="tabChat" class="tab-content">
        <div id="chatBox"></div>
        <input type="text" id="msgInput" placeholder="Sua mensagem..." style="width:70%;">
        <button id="btnSend">Enviar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { /* SEUS DADOS AQUI */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Lógica do Status
    window.entrar = async () => {
        const user = (await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)).user;
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('painelBox').style.display = 'block';

        // Monitorar Status
        onSnapshot(doc(db, "pedidos", user.uid), (doc) => {
            const status = doc.exists() ? doc.data().status : "Pendente";
            const badge = document.getElementById('statusBadge');
            badge.innerText = status;
            badge.style.background = status === "Concluído" ? "#28a745" : "#6c757d";
        });

        // Monitorar Chat
        onSnapshot(query(collection(db, "chat", user.uid, "mensagens"), orderBy("timestamp")), (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach(doc => {
                const p = document.createElement('div');
                p.className = "msg" + (doc.data().remetente === user.email ? " me" : "");
                p.innerText = doc.data().texto;
                chatBox.appendChild(p);
            });
        });
    };

    document.getElementById('btnLogin').onclick = entrar;
    
    document.getElementById('btnSend').onclick = async () => {
        const texto = document.getElementById('msgInput').value;
        const user = auth.currentUser;
        await addDoc(collection(db, "chat", user.uid, "mensagens"), {
            texto, remetente: user.email, timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };

    window.openTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        event.currentTarget.classList.add('active');
    };
</script>
</body>
</html>
