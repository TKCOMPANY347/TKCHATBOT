<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Company - Painel</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 95%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Abas de Login/Cadastro */
        .tabs-nav { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-link { flex: 1; padding: 10px; cursor: pointer; text-align: center; color: #555; }
        .tab-link.active { border-bottom: 2px solid #075e54; font-weight: bold; color: #075e54; }
        .form-area { display: none; }
        .form-area.active { display: block; }
        
        /* Painel Status/Chat */
        #painelBox { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .status-badge { padding: 10px 25px; border-radius: 50px; color: white; font-weight: bold; display: inline-block; margin: 15px 0; }
        #chatBox { height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; background: #eee; width: fit-content; max-width: 80%; }
        .msg.me { background: #dcf8c6; margin-left: auto; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: #075e54; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box" id="authBox">
    <div class="tabs-nav">
        <div class="tab-link active" onclick="switchForm('login')">Entrar</div>
        <div class="tab-link" onclick="switchForm('register')">Cadastrar</div>
    </div>
    <div id="loginForm" class="form-area active">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btnLogin">Entrar</button>
    </div>
    <div id="registerForm" class="form-area">
        <input type="email" id="regEmail" placeholder="E-mail">
        <input type="password" id="regSenha" placeholder="Senha">
        <button id="btnRegister">Cadastrar</button>
    </div>
</div>

<div class="box" id="painelBox">
    <div class="tabs-nav">
        <div class="tab-link active" onclick="openTab('status')">Status</div>
        <div class="tab-link" onclick="openTab('chat')">Chat</div>
    </div>

    <div id="tabStatus" class="tab-content active">
        <h3>Olá!</h3>
        <div id="statusBadge" class="status-badge" style="background:#6c757d;">Carregando...</div>
        <p id="minhaObs"></p>
        <div id="adminControls" style="display:none; border-top:1px solid #ccc; margin-top:10px; padding-top:10px;">
            <input type="text" id="adminUID" placeholder="UID do Cliente">
            <input type="text" id="newStatus" placeholder="Novo Status">
            <input type="text" id="newObs" placeholder="Observação">
            <button onclick="updatePedido()" style="background:#28a745;">Atualizar</button>
        </div>
    </div>

    <div id="tabChat" class="tab-content">
        <div id="chatBox"></div>
        <input type="text" id="msgInput" placeholder="Mensagem...">
        <button id="btnSend">Enviar</button>
    </div>
    <button onclick="location.reload()" style="background:#e53935; margin-top:10px;">Sair</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
        authDomain: "tkbot-d91db.firebaseapp.com",
        projectId: "tkbot-d91db",
        storageBucket: "tkbot-d91db.firebasestorage.app",
        messagingSenderId: "636885931448",
        appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Navegação geral
    window.switchForm = (type) => {
        document.querySelectorAll('.form-area').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Form').classList.add('active');
    };

    window.openTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    };

    // Lógica Login/Cadastro
    document.getElementById('btnLogin').onclick = async () => {
        try {
            const user = (await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)).user;
            initPainel(user);
        } catch (e) { alert("Erro de Login"); }
    };

    document.getElementById('btnRegister').onclick = async () => {
        try {
            await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regSenha').value);
            alert("Cadastro feito! Agora pode entrar.");
        } catch (e) { alert("Erro ao cadastrar"); }
    };

    function initPainel(user) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('painelBox').style.display = 'block';

        if (user.email === "patrickrobert347@gmail.com") document.getElementById('adminControls').style.display = 'block';

        onSnapshot(doc(db, "pedidos", user.uid), (doc) => {
            const data = doc.exists() ? doc.data() : {status: "Pendente", obs: "..."};
            document.getElementById('statusBadge').innerText = data.status;
            document.getElementById('statusBadge').style.background = data.status.includes("Concluído") ? "#28a745" : "#007bff";
            document.getElementById('minhaObs').innerText = data.obs;
        });

        onSnapshot(query(collection(db, "chat", user.uid, "mensagens"), orderBy("timestamp")), (snap) => {
            const chat = document.getElementById('chatBox');
            chat.innerHTML = "";
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = "msg" + (d.data().email === user.email ? " me" : "");
                div.innerText = d.data().texto;
                chat.appendChild(div);
            });
        });
    }

    window.updatePedido = async () => {
        const uid = document.getElementById('adminUID').value;
        await setDoc(doc(db, "pedidos", uid), { status: document.getElementById('newStatus').value, obs: document.getElementById('newObs').value });
        alert("Atualizado!");
    };

    document.getElementById('btnSend').onclick = async () => {
        const txt = document.getElementById('msgInput').value;
        if(!txt) return;
        await addDoc(collection(db, "chat", auth.currentUser.uid, "mensagens"), {
            texto: txt, email: auth.currentUser.email, timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };
</script>
</body>
</html>
