<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Chat - Completo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Containers */
        .auth-container { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chat-container { display: none; width: 100%; height: 100%; flex-direction: column; background: white; }
        
        /* Abas e Forms */
        .auth-tabs { display: flex; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border: none; background: #eee; }
        .tab-btn.active { background: #075e54; color: white; }
        .auth-form { display: none; flex-direction: column; gap: 10px; }
        .auth-form.active { display: flex; }
        
        /* Chat UI */
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: white; max-width: 80%; }
        .chat-input { display: flex; padding: 10px; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLogin">Entrar</button>
            <button class="tab-btn" id="tabRegister">Cadastrar</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button id="btnEntrar">Fazer Login</button>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="email" id="remail" placeholder="Novo E-mail">
            <input type="password" id="rpass" placeholder="Nova Senha">
            <button id="btnCadastrar">Concluir Cadastro</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span id="statusOnline">Chat (0 online)</span>
            <button id="btnSair">Sair</button>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="btnEnviar">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.firebasestorage.app",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Alternar Abas
        document.getElementById('tabLogin').onclick = () => {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
        };
        document.getElementById('tabRegister').onclick = () => {
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
        };

        // Firebase Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                // Registrar Online
                await setDoc(doc(db, "status", user.uid), { email: user.email });
                
                // Carregar Mensagens
                onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
                    const msgDiv = document.getElementById('messages');
                    msgDiv.innerHTML = '';
                    snap.forEach(d => {
                        const data = d.data();
                        msgDiv.innerHTML += `<div><b>${data.sender}:</b> ${data.text}</div>`;
                    });
                });
            } else {
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('chatContainer').style.display = 'none';
            }
        });

        // Contar Online
        onSnapshot(collection(db, "status"), (snap) => {
            document.getElementById('statusOnline').innerText = `Chat (${snap.size} online)`;
        });

        // Ações
        document.getElementById('btnEntrar').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        document.getElementById('btnCadastrar').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('remail').value, document.getElementById('rpass').value);
        document.getElementById('btnEnviar').onclick = async () => {
            await addDoc(collection(db, "messages"), { text: document.getElementById('msgInput').value, sender: auth.currentUser.email, timestamp: serverTimestamp() });
            document.getElementById('msgInput').value = '';
        };
        document.getElementById('btnSair').onclick = async () => {
            await deleteDoc(doc(db, "status", auth.currentUser.uid));
            signOut(auth);
        };
    </script>
</body>
</html>
