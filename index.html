<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Company - Painel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('photo_2026-03-16_14-04-07.jpg');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; justify-content: center; align-items: center; 
        }
        .box { width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #painelStatus { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div id="loginArea">
        <h2>Acesso do Cliente</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btnLogin">Entrar no Painel</button>
    </div>

    <div id="painelStatus">
        <h2>Olá!</h2>
        <div style="margin: 20px 0;">
            <p>Seu Status Atual:</p>
            <h2 id="meuStatus" style="color:#075e54; margin:10px 0;">Carregando...</h2>
            <p id="minhaObs"></p>
        </div>
        <button onclick="location.reload()" style="background:#e53935;">Sair</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
        authDomain: "tkbot-d91db.firebaseapp.com",
        projectId: "tkbot-d91db",
        storageBucket: "tkbot-d91db.firebasestorage.app",
        messagingSenderId: "636885931448",
        appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, senha);
            const user = userCredential.user;

            // Esconde login, mostra painel
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('painelStatus').style.display = 'block';

            // Busca os dados APÓS o login bem-sucedido
            onSnapshot(doc(db, "pedidos", user.uid), (doc) => {
                if (doc.exists()) {
                    document.getElementById('meuStatus').innerText = doc.data().status;
                    document.getElementById('minhaObs').innerText = doc.data().obs;
                } else {
                    document.getElementById('meuStatus').innerText = "Status não cadastrado.";
                }
            });
        } catch (e) {
            alert("Erro: Verifique e-mail e senha.");
        }
    };
</script>
</body>
</html>
