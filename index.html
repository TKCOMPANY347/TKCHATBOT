<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Chat</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #authContainer, #chatContainer { width: 100%; max-width: 400px; background: white; height: 100%; display: flex; flex-direction: column; }
        #chatHeader { padding: 15px; background: #075e54; color: white; font-weight: bold; }
        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; }
        .input-area { padding: 10px; display: flex; border-top: 1px solid #ccc; background: white; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px; cursor: pointer; }
        .msg { margin-bottom: 10px; padding: 8px; background: white; border-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="authContainer">
        <h2 style="text-align:center">Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
    </div>

    <div id="chatContainer" style="display:none;">
        <div id="chatHeader"><span id="userDisplay"></span></div>
        <div id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onDisconnect, serverTimestamp as rtdbTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com",
            storageBucket: "tkbot-d91db.appspot.com",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const firestore = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('userDisplay').innerText = user.email + " (Online)";

                // Status Online
                const statusRef = ref(db, 'status/' + user.uid);
                set(statusRef, { state: 'online', last_changed: rtdbTimestamp() });
                onDisconnect(statusRef).set({ state: 'offline', last_changed: rtdbTimestamp() });

                // Carregar mensagens do Firestore
                const q = query(collection(firestore, "messages"), orderBy("timestamp", "asc"));
                onSnapshot(q, (snapshot) => {
                    const msgDiv = document.getElementById('chatMessages');
                    msgDiv.innerHTML = '';
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        msgDiv.innerHTML += `<div class="msg"><b>${data.sender}:</b> ${data.text}</div>`;
                    });
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                });
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao entrar"));
        });

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const text = document.getElementById('msgInput').value;
            if(text && auth.currentUser) {
                await addDoc(collection(firestore, "messages"), { 
                    text: text, 
                    sender: auth.currentUser.email, 
                    timestamp: serverTimestamp() 
                });
                document.getElementById('msgInput').value = '';
            }
        });
    </script>
</body>
</html>
