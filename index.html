<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Company - Painel de Status</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('photo_2026-03-16_14-04-07.jpg');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; justify-content: center; align-items: center; 
        }
        .box { width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #painelStatus { display: none; }
        .status-box { padding: 20px; background: #f0f0f0; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <div id="loginArea">
        <h2>Acesso do Cliente</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btnLogin">Entrar no Painel</button>
    </div>

    <div id="painelStatus">
        <h2>Olá, Cliente!</h2>
        <div class="status-box">
            <p>Seu Status Atual:</p>
            <h2 id="meuStatus" style="color:#075e54; margin:15px 0;">Buscando...</h2>
            <p id="minhaObs"></p>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:#e53935;">Sair</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
        authDomain: "tkbot-d91db.firebaseapp.com",
        projectId: "tkbot-d91db",
        storageBucket: "tkbot-d91db.firebasestorage.app",
        messagingSenderId: "636885931448",
        appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Login
    document.getElementById('btnLogin').onclick = async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value);
        } catch (e) { alert("Erro ao entrar!"); }
    };

    // Monitorar login e buscar status
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('painelStatus').style.display = 'block';
            
            // Busca o status do documento com o ID do usuário no Firestore
            onSnapshot(doc(db, "pedidos", user.uid), (doc) => {
                if (doc.exists()) {
                    document.getElementById('meuStatus').innerText = doc.data().status;
                    document.getElementById('minhaObs').innerText = doc.data().obs;
                } else {
                    document.getElementById('meuStatus').innerText = "Status não encontrado";
                }
            });
        }
    });
</script>
</body>
</html>
