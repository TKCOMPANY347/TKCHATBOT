<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - Versão Compacta</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .auth-container, .chat-container { width: 100%; max-width: 400px; height: 100vh; background: white; display: flex; flex-direction: column; }
        .chat-container { display: none; }
        .auth-form { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; background: #efeae2; display: flex; flex-direction: column; gap: 8px; }
        .message { padding: 6px 10px; border-radius: 12px; font-size: 0.9rem; max-width: 80%; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .sender-name { font-size: 0.7rem; color: #555; display: block; margin-bottom: 2px; font-weight: bold; }
        .chat-input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #00a884; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <div class="auth-form" id="loginForm">
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button id="submitLoginBtn">Entrar</button>
            <hr><button id="showRegisterBtn" style="background:#555">Criar Conta</button>
        </div>
        <div class="auth-form" id="registerForm" style="display:none;">
            <input type="text" id="registerName" placeholder="Como quer ser chamado?">
            <input type="email" id="registerEmail" placeholder="E-mail">
            <input type="password" id="registerPassword" placeholder="Senha">
            <button id="submitRegisterBtn">Concluir Cadastro</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header"><span id="userDisplay">Chatbot</span><button id="logoutBtn">Sair</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Mensagem...">
            <button id="sendButton">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc, getDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import Groq from "https://cdn.skypack.dev/groq-sdk";

        const firebaseConfig = {
            apiKey: "AIzaSyDkpjVCN_Nj6hSsakz5kDYrSOwCA2oPMcE",
            authDomain: "tkbot-d91db.firebaseapp.com",
            projectId: "tkbot-d91db",
            storageBucket: "tkbot-d91db.firebasestorage.app",
            messagingSenderId: "636885931448",
            appId: "1:636885931448:web:ea0884ab1d6674e5a4ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentUserName = "Usuário";

        // Alternar telas
        document.getElementById('showRegisterBtn').addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'flex';
        });

        // Cadastro com Nome
        document.getElementById('submitRegisterBtn').addEventListener('click', async () => {
            const nome = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const pass = document.getElementById('registerPassword').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), { nome: nome });
                alert("Conta criada!");
            } catch(e) { alert("Erro ao criar conta"); }
        });

        // Login
        document.getElementById('submitLoginBtn').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
            catch(e) { alert("Erro ao entrar"); }
        });

        // Monitorar usuário e carregar Nome
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUserName = userDoc.exists() ? userDoc.data().nome : "Usuário";
                document.getElementById('userDisplay').innerText = currentUserName;
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                loadMessages();
            }
        });

        // Enviar com o Nome
        async function sendMessage() {
            const texto = document.getElementById('messageInput').value.trim();
            if (!texto) return;
            await addDoc(collection(db, "messages"), { 
                text: texto, senderId: currentUser.uid, senderName: currentUserName, timestamp: serverTimestamp() 
            });
            document.getElementById('messageInput').value = '';
        }

        document.getElementById('sendButton').addEventListener('click', sendMessage);

        // Carregar mensagens e exibir senderName
        function loadMessages() {
            onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = `message ${data.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    div.innerHTML = `<span class="sender-name">${data.senderName || 'IA'}</span>${data.text}`;
                    container.appendChild(div);
                });
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
