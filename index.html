<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Chat</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Ajuste do Login para ficar proporcional */
        #authContainer { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background-color: #f0f2f5; }
        #authContainer h2 { color: #075e54; margin-bottom: 15px; }
        #authContainer input { width: 100%; max-width: 320px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #authContainer button { width: 100%; max-width: 320px; padding: 10px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 5px; }

        /* Estilização do Chat */
        #chatContainer { height: 100%; display: flex; flex-direction: column; }
        #chatHeader { padding: 10px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        
        #presencePanel { padding: 6px; background: #e0e0e0; font-size: 12px; color: #333; text-align: center; border-bottom: 1px solid #ccc; }
        
        #chatMessages { flex: 1; padding: 10px; overflow-y: auto; background: #efeae2; }
        .input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ccc; }
        input#msgInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-right: 5px; }
        button#sendBtn { padding: 8px 15px; cursor: pointer; background: #075e54; color: white; border: none; border-radius: 4px; }
        #logoutBtn { background: #c0392b; font-size: 12px; }
        .msg { margin-bottom: 8px; padding: 8px; background: white; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="authContainer">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn">Entrar</button>
        <button id="registerBtn" style="background-color: #27ae60;">Criar Conta</button>
    </div>

    <div id="chatContainer" style="display:none;">
        <div id="chatHeader">
            <span id="userDisplay"></span>
            <button id="logoutBtn">Sair</button>
        </div>
        <div id="presencePanel">Carregando status...</div>
        <div id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // [Configuração Firebase omitida por brevidade, use a sua original]
        const firebaseConfig = { /* ... */ }; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ... [Lógica de onAuthStateChanged, Login, Registro e Envio de mensagens mantida] ...
        
        // Adicionei o botão de registro:
        document.getElementById('registerBtn').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(e => alert("Erro ao criar conta: " + e.message));
        });
    </script>
</body>
</html>
