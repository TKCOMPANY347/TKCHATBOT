<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Chat Completo</title>
    <style>
        /* ... (O SEU CSS ORIGINAL FICA AQUI) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 100%; height: 100%; background-color: #fff; display: flex; flex-direction: column; }
        .chat-header { background-color: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background-color: #efeae2; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; }
        .sent { background-color: #d9fdd3; align-self: flex-end; }
        .received { background-color: #fff; align-self: flex-start; }
        .chat-input-area { display: flex; padding: 15px; background-color: #f0f0f0; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; }
        button { background-color: #00a884; color: white; border: none; padding: 0 25px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header" id="headerStatus">Sala de Chat (Conectando...)</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Digite uma mensagem...">
            <button id="sendButton">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://tkbot-d91db-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Gera um ID simples para o usuário não ficar anônimo (pode trocar pelo e-mail depois)
        const userId = "User_" + Math.floor(Math.random() * 1000);

        // 1. Função de STATUS ONLINE
        const statusRef = ref(db, 'status/' + userId);
        set(statusRef, { state: 'online' });
        onDisconnect(statusRef).set({ state: 'offline' });

        // 2. Contador de online no cabeçalho
        onValue(ref(db, 'status'), (snap) => {
            let onlineCount = 0;
            snap.forEach(s => { if(s.val().state === 'online') onlineCount++; });
            document.getElementById('headerStatus').innerText = `Sala de Chat (${onlineCount} online)`;
        });

        // 3. Lógica do CHAT
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        
        onValue(ref(db, 'messages'), (snap) => {
            chatMessages.innerHTML = '';
            snap.forEach(s => {
                const msg = s.val();
                const div = document.createElement('div');
                div.className = `message ${msg.sender === userId ? 'sent' : 'received'}`;
                div.innerText = msg.text;
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        document.getElementById('sendButton').onclick = () => {
            if (messageInput.value.trim() !== '') {
                push(ref(db, 'messages'), { text: messageInput.value, sender: userId });
                messageInput.value = '';
            }
        };
    </script>
</body>
</html>
